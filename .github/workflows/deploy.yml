name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://nqfkdvdbcbzswwgexziy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xZmtkdmRiY2J6c3d3Z2V4eml5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NTcsImV4cCI6MjA5NTIwNjQ1N30.YK1K4ZfkPZFXsagDc_xmCnONk-oF2iIY86wgtt2ExtM
      - run: npx netlify-cli deploy --prod --dir=dist --site="$NETLIFY_SITE_ID"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
